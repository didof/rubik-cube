<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3x3x3 Cube Scene</title>
<style>
    body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; user-select: none; -webkit-user-select: none; }
    canvas { display: block; }
    #ui-container { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; pointer-events: none; }
    #shuffle-btn { pointer-events: auto; padding: 16px 32px; font-size: 1.2rem; font-weight: bold; color: #111; background: #fff; border: none; border-radius: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.1s, background 0.2s; font-family: sans-serif; }
    #shuffle-btn:active { transform: scale(0.95); background: #eee; }
</style>
<script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
</script>
</head>
<body>
<div id="ui-container">
    <button id="shuffle-btn">Shuffle</button>
</div>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls;
    const cubes = [];
    let dragInfo = null;
    let activeTweens = [];
    let moveQueue = [];
    
    const raycaster = new THREE.Raycaster();
    const AXES = [new THREE.Vector3(1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1)];

    function init() {
        scene = new THREE.Scene();
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 6);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(10, 20, 15);
        scene.add(directionalLight);

        const colors = [0xff0000, 0xff8800, 0xffffff, 0xffff00, 0x00ff00, 0x0000ff];
        const mats = colors.map(c => new THREE.MeshStandardMaterial({ color: c, roughness: 0.2, metalness: 0.1 }));
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        
        const geometry = new THREE.BoxGeometry(0.95, 0.95, 0.95);
        
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const cubieMats = [
                        x === 1 ? mats[0] : blackMat,
                        x === -1 ? mats[1] : blackMat,
                        y === 1 ? mats[2] : blackMat,
                        y === -1 ? mats[3] : blackMat,
                        z === 1 ? mats[4] : blackMat,
                        z === -1 ? mats[5] : blackMat,
                    ];
                    const cube = new THREE.Mesh(geometry, cubieMats);
                    cube.position.set(x, y, z);
                    scene.add(cube);
                    cubes.push(cube);
                }
            }
        }

        renderer.domElement.addEventListener('pointerdown', onPointerDown, true);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);
        window.addEventListener('resize', onWindowResize);
        document.getElementById('shuffle-btn').addEventListener('click', triggerShuffle);
        
        animate();
    }

    function triggerShuffle() {
        if (moveQueue.length > 0 || activeTweens.length > 0 || dragInfo) return;
        
        const movesCount = 20;
        for (let i = 0; i < movesCount; i++) {
            const axis = AXES[Math.floor(Math.random() * 3)];
            const sliceVal = Math.random() > 0.5 ? 1 : -1; 
            const angle = (Math.random() > 0.5 ? 1 : -1) * (Math.PI / 2);
            moveQueue.push({ axis, sliceVal, angle });
        }
    }

    function processQueue() {
        if (moveQueue.length > 0 && activeTweens.length === 0 && !dragInfo) {
            const move = moveQueue.shift();
            const pivot = new THREE.Group();
            scene.add(pivot);
            
            controls.enabled = false;

            cubes.forEach(c => {
                const pos = c.getWorldPosition(new THREE.Vector3());
                if (Math.round(pos.dot(move.axis)) === move.sliceVal) {
                    pivot.attach(c);
                }
            });

            activeTweens.push({
                pivot: pivot,
                rotationAxis: move.axis,
                startAngle: 0,
                targetAngle: move.angle,
                progress: 0,
                speed: 0.15 
            });
        }
    }

    function onPointerDown(e) {
        if (activeTweens.length > 0 || moveQueue.length > 0) return;

        const rect = renderer.domElement.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
        const intersects = raycaster.intersectObjects(cubes);
        
        if (intersects.length > 0) {
            controls.enabled = false;
            const obj = intersects[0].object;
            const normal = intersects[0].face.normal.clone().transformDirection(obj.matrixWorld).round();
            dragInfo = {
                object: obj,
                normal: normal,
                startX: e.clientX,
                startY: e.clientY,
                pivot: new THREE.Group(),
                axis: null,
                invalid: false
            };
            scene.add(dragInfo.pivot);
        }
    }

    function onPointerMove(e) {
        if (!dragInfo || dragInfo.invalid) return;
        
        const dx = e.clientX - dragInfo.startX;
        const dy = e.clientY - dragInfo.startY;
        
        if (!dragInfo.axis && (dx*dx + dy*dy) > 25) {
            const dragAxes = [new THREE.Vector3(1,0,0), new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,1)]
                .filter(a => Math.abs(a.dot(dragInfo.normal)) < 0.5);
                
            const objPos = dragInfo.object.getWorldPosition(new THREE.Vector3());
            const p1 = objPos.clone().project(camera);
            
            let bestDragAxis = null;
            let maxDot = -1;
            let screenDragDir = null;
            
            const mouseVec = new THREE.Vector2(dx, -dy).normalize();
            
            dragAxes.forEach(axis => {
                const p2 = objPos.clone().add(axis).project(camera);
                const dir = new THREE.Vector2(p2.x - p1.x, p2.y - p1.y).normalize();
                const d = Math.abs(mouseVec.dot(dir));
                if (d > maxDot) {
                    maxDot = d;
                    bestDragAxis = axis;
                    screenDragDir = dir;
                }
            });
            
            const rotationAxis = dragInfo.normal.clone().cross(bestDragAxis).round();
            const sliceVal = Math.round(objPos.dot(rotationAxis));
            
            if (sliceVal === 0) {
                dragInfo.invalid = true;
                return;
            }

            dragInfo.axis = bestDragAxis;
            dragInfo.rotationAxis = rotationAxis;
            dragInfo.screenDir = screenDragDir;
            
            cubes.forEach(c => {
                if (Math.round(c.getWorldPosition(new THREE.Vector3()).dot(dragInfo.rotationAxis)) === sliceVal) {
                    dragInfo.pivot.attach(c);
                }
            });
        }
        
        if (dragInfo.axis) {
            const mouseDelta = new THREE.Vector2(dx, -dy);
            const dragAmount = mouseDelta.dot(dragInfo.screenDir);
            dragInfo.angle = dragAmount * (Math.PI / (window.innerWidth / 2));
            dragInfo.pivot.setRotationFromAxisAngle(dragInfo.rotationAxis, dragInfo.angle);
        }
    }

    function onPointerUp() {
        if (!dragInfo) return;

        if (dragInfo.invalid) {
            scene.remove(dragInfo.pivot);
            dragInfo = null;
            if (moveQueue.length === 0) controls.enabled = true;
            return;
        }
        
        if (dragInfo.axis) {
            const snapAngle = Math.round(dragInfo.angle / (Math.PI / 2)) * (Math.PI / 2);
            activeTweens.push({
                pivot: dragInfo.pivot,
                rotationAxis: dragInfo.rotationAxis,
                startAngle: dragInfo.angle,
                targetAngle: snapAngle,
                progress: 0,
                speed: 0.1
            });
        } else {
            scene.remove(dragInfo.pivot);
            if (moveQueue.length === 0) controls.enabled = true;
        }
        
        dragInfo = null;
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        processQueue();

        for (let i = activeTweens.length - 1; i >= 0; i--) {
            const t = activeTweens[i];
            t.progress += t.speed;
            
            if (t.progress >= 1) {
                t.progress = 1;
                t.pivot.setRotationFromAxisAngle(t.rotationAxis, t.targetAngle);
                t.pivot.updateMatrixWorld();
                
                const children = [...t.pivot.children];
                children.forEach(c => {
                    scene.attach(c);
                    c.updateMatrix();
                    for (let j = 0; j < 16; j++) {
                        c.matrix.elements[j] = Math.round(c.matrix.elements[j]);
                    }
                    c.matrix.decompose(c.position, c.quaternion, c.scale);
                });
                
                scene.remove(t.pivot);
                
                if (moveQueue.length === 0) {
                    controls.enabled = true;
                }
                
                if ('vibrate' in navigator) {
                    navigator.vibrate(20);
                }
                
                activeTweens.splice(i, 1);
            } else {
                const easeOut = 1 - Math.pow(1 - t.progress, 3);
                const currentAngle = THREE.MathUtils.lerp(t.startAngle, t.targetAngle, easeOut);
                t.pivot.setRotationFromAxisAngle(t.rotationAxis, currentAngle);
            }
        }

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
